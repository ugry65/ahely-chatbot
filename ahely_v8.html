// Névnormalizálás: kisbetű + ékezetek eltávolítása
function norm(str){
  return str.toLowerCase()
    .replace(/á/g,"a").replace(/é/g,"e").replace(/í/g,"i")
    .replace(/ó/g,"o").replace(/ö/g,"o").replace(/ő/g,"o")
    .replace(/ú/g,"u").replace(/ü/g,"u").replace(/ű/g,"u")
    .replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim();
}

// Fuzzy névkeresés - töredékes névből is megtalálja
function findSP(txt){
  var v = norm(txt);
  // 1. Teljes névegyezés
  for(var i=0;i<SP.length;i++){
    if(norm(SP[i].n) === v) return SP[i];
  }
  // 2. A keresett szó benne van a névben (vagy fordítva)
  for(var i=0;i<SP.length;i++){
    var sn = norm(SP[i].n);
    if(sn.indexOf(v) > -1 || v.indexOf(sn) > -1) return SP[i];
  }
  // 3. Szavankénti keresés - ha bármelyik szó egyezik (min 4 karakter)
  var words = v.split(" ").filter(function(w){ return w.length >= 4; });
  for(var i=0;i<SP.length;i++){
    var sn = norm(SP[i].n);
    for(var j=0;j<words.length;j++){
      if(sn.indexOf(words[j]) > -1) return SP[i];
    }
  }
  // 4. Legjobb részleges egyezés
  var best = null, bestScore = 0;
  for(var i=0;i<SP.length;i++){
    var sn = norm(SP[i].n);
    var score = 0;
    var vw = v.split(" ");
    var snw = sn.split(" ");
    for(var j=0;j<vw.length;j++){
      for(var k=0;k<snw.length;k++){
        if(vw[j].length >= 3 && snw[k].indexOf(vw[j]) > -1) score += vw[j].length;
      }
    }
    if(score > bestScore){ bestScore = score; best = SP[i]; }
  }
  if(bestScore >= 4) return best;
  return null;
}

// UI
function botMsg(txt){
  var d = document.createElement("div");
  d.className = "msg bot";
  d.innerHTML = txt.replace(/\n/g,"<br>");
  document.getElementById("msgs").appendChild(d);
  scroll();
  return d;
}
function userMsg(txt){
  var d = document.createElement("div");
  d.className = "msg user";
  d.textContent = txt;
  document.getElementById("msgs").appendChild(d);
  scroll();
}
function crisisMsg(){
  sendEvent('crisis_shown');
  var d = document.createElement("div");
  d.className = "msg crisis";
  d.innerHTML = "Ha úgy érzed, hogy közvetlen veszélyben vagy, vagy önsértéssel / öngyilkossággal kapcsolatos gondolataid vannak, kérlek, azonnal hívd a <strong>112</strong>-t, vagy keresd a területileg illetékes sürgősségi ellátást.<br><br>Ha nem vagy közvetlen veszélyben, de nagyon megterhelő, amit átélsz — érdemes mielőbb szakemberrel kapcsolatba lépned.";
  document.getElementById("msgs").appendChild(d);
  scroll();
}
function scroll(){
  var m = document.getElementById("scrollArea");
  var sections = document.querySelectorAll("#btns .sec");
  if(sections.length > 1){
    // Több kategóriára bontott gomblistánál (pl. témaválasztás) ne az aljára ugorjunk,
    // hanem a kérdés (utolsó bot üzenet) tetejére, hogy minden kategória látható legyen görgetéssel.
    var msgs = document.getElementById("msgs");
    var bots = msgs.querySelectorAll(".msg.bot");
    var lastBot = bots.length ? bots[bots.length - 1] : null;
    if(lastBot){ lastBot.scrollIntoView({behavior:"smooth", block:"start"}); return; }
  }
  m.scrollTop = m.scrollHeight;
}

function showCard(sp, context){
  sendEvent('recommendation_shown_card', {name:sp.n, context: context || 'unknown'});
  var tags = sp.s.split(",").map(function(t){ return t.trim(); }).filter(Boolean);
  var d = document.createElement("div");
  d.className = "card";
  var imgHtml = "";
  if(sp.img){
    var im = document.createElement("img");
    im.src = sp.img;
    im.alt = sp.n;
    im.onerror = function(){ this.style.display="none"; };
    im.style.cssText = "width:56px;height:56px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #c8f5f3;display:block";
    imgHtml = im.outerHTML;
  } else {
    imgHtml = "<div style='width:56px;height:56px;border-radius:50%;background:#e8faf6;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0'>&#128100;</div>";
  }
  var capBadge = hasCapacity(sp)
    ? "<span class='cap-badge cap-free'>Szabad kapacitással rendelkezik</span>"
    : "<span class='cap-badge cap-wait'>Várólista lehetséges</span>";
  d.innerHTML = "<div style='display:flex;gap:12px;align-items:flex-start'>"+imgHtml+"<div style='flex:1'><h4>"+sp.n+"</h4><div class='role'>"+sp.r+"</div>"+capBadge+"<div class='tags'>"+tags.map(function(t){ return "<span class='tag'>"+t+"</span>"; }).join("")+"</div><a href='"+sp.url+"' target='_blank'>Profil megtekintése</a></div></div>";
  document.getElementById("msgs").appendChild(d);
  var profileLink = d.querySelector("a");
  if(profileLink){
    profileLink.addEventListener("click", function(){
      sendEvent('profile_link_clicked', {name:sp.n, context: context || 'unknown'});
    });
  }
  scroll();
}

// Kártyalista megjelenítése két csoportban: előbb a szabad kapacitásúak,
// utána a várólistások, mindkettő elé fejléccel — csak ha van benne elem.
function showCardsGrouped(list, context, onEach){
  var free = list.filter(function(sp){ return hasCapacity(sp); });
  var wait = list.filter(function(sp){ return !hasCapacity(sp); });
  function renderGroup(arr){
    arr.forEach(function(sp){
      showCard(sp, context);
      if(onEach) onEach(sp);
    });
  }
  if(free.length){ showSectionLabel("Szabad kapacitással rendelkező kollégák"); renderGroup(free); }
  if(wait.length){ showSectionLabel("Kollégák, akiknél várólista van:"); renderGroup(wait); }
}

// A szabadszöveges beviteli sor csak ott jelenjen meg, ahol valóban kötelező a gépelés
// (névkeresés), vagy ahol a látogató kifejezetten a "Más téma" lehetőséget választotta.
// Minden más gombos lépésnél (kor, végzettség, nem, forma, ÉS a témaválasztás is) NEM
// jelenik meg - ott a gombok közül kell választani, a szabad szöveg nem releváns.
var FREE_TEXT_STEPS = [];
function hideInputRow(){
  document.getElementById("row").className = "off";
}
function showInputRow(placeholder){
  var row = document.getElementById("row");
  row.className = "";
  document.getElementById("inp").placeholder = placeholder || "Válassz vagy írj ide szabadon...";
}

function showBtns(key, multi){
  if(FREE_TEXT_STEPS.indexOf(key) > -1){
    showInputRow("Válassz fent, vagy írj ide szabadon...");
  } else {
    hideInputRow();
  }
  var c = document.getElementById("btns");
  c.innerHTML = "";
  c.className = "";
  selectedTopics = [];
  var items = BTNS[key] || [];
  if(multi){
    var info = document.createElement("div");
    info.style.cssText = "width:100%;font-size:12px;color:#666;margin-bottom:4px";
    info.textContent = "Több témát is választhatsz, majd kattints a Tovább gombra.";
    c.appendChild(info);
  }
  for(var i=0;i<items.length;i++){
    var item = items[i];
    if(item.sec !== undefined){
      if(!item.sec) continue;
      var s = document.createElement("div");
      s.className = "sec";
      s.textContent = item.sec;
      c.appendChild(s);
      continue;
    }
    var btn = document.createElement("button");
    btn.className = "b";
    btn.textContent = item.l;
    if(multi){
      (function(b, val){ b.onclick = function(){ toggleT(b, val); }; })(btn, item.v);
    } else {
      (function(b, lbl, val){ b.onclick = function(){ pick(lbl, val); }; })(btn, item.l, item.v);
    }
    c.appendChild(btn);
  }
  if(multi){
    var tv = document.createElement("button");
    tv.className = "tovabb";
    tv.id = "tv";
    tv.textContent = "Tovább a kiválasztott témákkal";
    tv.onclick = sendTopics;
    c.appendChild(tv);
  }
  scroll();
}
function hideBtns(){ var c = document.getElementById("btns"); c.className = "off"; c.innerHTML = ""; }
function toggleT(btn, val){
  var idx = selectedTopics.indexOf(val);
  if(idx > -1){ selectedTopics.splice(idx,1); btn.classList.remove("on"); }
  else { selectedTopics.push(val); btn.classList.add("on"); }
  var tv = document.getElementById("tv");
  if(tv) tv.style.display = selectedTopics.length > 0 ? "block" : "none";
}
// Logikai ellenőrzés
var GYEREK_KOROK = ["csecsemo","kiskoru","gyerek","kamasz"];
var FELNO_TEMAK_KIZARO = ["Karrier","karrierváltás","Célkeresés","Célkitűzés","Vezetők","Munka-magánélet","Teljesítmény / motiváció","Szexuál","Addikció","üzleti"];

function checkLogic(temak){
  if(!state.kor) return true;
  if(GYEREK_KOROK.indexOf(state.kor) > -1){
    for(var i=0;i<temak.length;i++){
      for(var j=0;j<FELNO_TEMAK_KIZARO.length;j++){
        if(temak[i].indexOf(FELNO_TEMAK_KIZARO[j]) > -1) return false;
      }
    }
  }
  return true;
}

function restart(){
  state = {kor:null, vegzettseg:null, nem:null, forma:null, temak:[]};
  step = 0;
  selectedTopics = [];
  busy = false;
  freeTextSearch = false;
  document.getElementById("msgs").innerHTML = "";
  hideBtns();
  SESSION_ID = 'sid_' + Date.now() + '_' + Math.random().toString(36).slice(2,10);
  sendEvent('session_start', {restarted:true});
  botMsg("Újraindítottam a keresést! Keresel már konkrét szakembert, vagy segítsek választani?");
  showBtns("start");
}

function sendTopics(){
  if(!selectedTopics.length) return;
  var lbl = selectedTopics.length === 1 ? selectedTopics[0] : "Több témában is keresek segítséget: " + selectedTopics.join("; ");
  state.temak = selectedTopics;
  sendEvent('topics_selected', {kor:state.kor, temak:selectedTopics});
  userMsg(lbl);
  hideBtns();
  var masTemaban = false;
  for(var mi=0;mi<selectedTopics.length;mi++){
    if(selectedTopics[mi].indexOf("Más témában") > -1){ masTemaban = true; break; }
  }
  if(masTemaban){
    hideBtns();
    botMsg("Köszönöm! Írd le röviden, milyen témában keresel segítséget — hátha tudok ajánlani valakit. Ha mégsem találunk megfelelő szakembert, mindenképp vedd fel velünk a kapcsolatot, csapatunk segít.");
    showInputRow("Írd le, milyen segítségre van szükséged...");
    freeTextSearch = true;
    step = 5;
    return;
  }
  if(!checkLogic(selectedTopics)){
    botMsg("Úgy tűnik, a választott témák nem illeszkednek a korábban megadott korcsoporthoz. Például csecsemőnél vagy kisgyermeknél karrierrel kapcsolatos kérdések nem jellemzők. Kérjük indítsuk újra a keresést!");
    hideInputRow();
    var c = document.getElementById("btns");
    c.className = "";
    var btn = document.createElement("button");
    btn.className = "b";
    btn.textContent = "Újraindítás";
    btn.onclick = restart;
    c.appendChild(btn);
    return;
  }
  callAI();
}

// Lépéskezelő
function pick(lbl, val){
  sendEvent('step', {step:step, value:val});
  userMsg(lbl);
  hideBtns();
  if(step === 0){
    if(val === "konkret"){
      step = -1;
      botMsg("Írd be a keresett szakember nevét, és azonnal megmutatom a profilját!");
      showInputRow("Írd be a szakember nevét...");
    } else {
      step = 1;
      botMsg("1. Milyen korú személynek keresel segítséget?");
      showBtns("kor");
    }
  } else if(step === 1){
    state.kor = val;
    step = 2;
    botMsg("2. Milyen típusú szakembert keresel? Pszichológust, vagy inkább egy coachot, aki az élethelyzeteddel, karrierrel, céljaiddal foglalkozik?");
    showBtns("vegzettseg");
  } else if(step === 2){
    state.vegzettseg = val;
    if(val === "coach"){
      step = 6;
      botMsg("Tökéletes! Coaching területen az A Hely csapatából elsősorban ajánlom:");
      showCard(SP[1], "coach"); // Oláh Imre
      botMsg("Az asszisztens nem ad diagnózist, és nem helyettesíti a pszichológiai, orvosi vagy sürgősségi ellátást.\n\nHa bizonytalan vagy, vedd fel velünk a kapcsolatot: https://a-hely.com/kapcsolat");
      showInputRow("Válassz vagy írj ide szabadon...");
      scroll();
    } else {
      step = 3;
      botMsg("3. Tökéletes, értem. Most egy másik kérdés: van-e preferenciád a szakember neme tekintetében?");
      showBtns("nem");
    }
  } else if(step === 3){
    state.nem = val;
    step = 4;
    botMsg("4. Köszönöm. Akkor a következő kérdés: szeretnél személyesen találkozni valakivel, vagy inkább online konzultációt részesítesz előnyben?");
    showBtns("forma");
  } else if(step === 4){
    state.forma = val;
    step = 5;
    botMsg("5. Tökéletes! Most már csak az utolsó lépés: milyen témával szeretnél foglalkozni egy szakemberrel? Mit érzel, hogy most milyen segítségre lenne szükséged?");
    var tkey = {felno:"tema_felno",kamasz:"tema_kamasz",gyerek:"tema_gyerek",kiskoru:"tema_gyerek",csecsemo:"tema_csecsemo"}[state.kor] || "tema_felno";
    showBtns(tkey, true);
  }
}

// Szabad szöveges input
function doSend(){
  var inp = document.getElementById("inp");
  var val = inp.value.trim();
  if(!val || busy) return;
  inp.value = "";

  // Krízis szavak
  var krizisok = ["ongyilkos","onsertes","meghalni","vegezni","bantom magam"];
  var vn = norm(val);
  for(var i=0;i<krizisok.length;i++){
    if(vn.indexOf(krizisok[i]) > -1){
      userMsg(val);
      hideBtns();
      crisisMsg();
      return;
    }
  }

  // Névkeresés — MINDIG fut, bármely lépésben
  var found = findSP(val);
  if(found){
    userMsg(val);
    hideBtns();
    botMsg(found.n + " profilját itt találod:");
    showCard(found, "name_search");
    botMsg("Ha szeretnéd, segítek más szakembert is keresni!");
    return;
  }

  // Lépés alapú kezelés
  if(step === -1){
    // Névkeresési módban vagyunk de nem találtuk
    userMsg(val);
    botMsg("Nem találtam ilyen nevű szakembert. Próbálj pontosabb nevet írni (pl. Keul Andrea, Oláh Imre), vagy indítsd el a kérdéssort a gombokkal!");
    step = 0;
    showBtns("start");
    return;
  }

  if(step === 5){
    state.temak = [val];
    sendEvent('topics_selected', {kor:state.kor, temak:[val], free_text:true});
    userMsg(val);
    hideBtns();
    freeTextSearch = true;
    callAI();
    return;
  }

  // Védelmi ág: a beviteli mező ezeken a lépéseken el van rejtve, így ide elvileg
  // nem juthatunk el normál használat mellett - de ha mégis (pl. korábban begépelt
  // és Enterrel elküldött szöveg), ne találgassunk alapértékeket, hanem kérjük meg
  // a látogatót, hogy a gombok közül válasszon.
  userMsg(val);
  botMsg("Kérlek, válassz a fenti lehetőségek közül a folytatáshoz!");
  if(step === 0){ showBtns("start"); }
  else if(step === 1){ showBtns("kor"); }
  else if(step === 2){ showBtns("vegzettseg"); }
  else if(step === 3){ showBtns("nem"); }
  else if(step === 4){ showBtns("forma"); }
}

function specialistMatchesKor(sp, kor){
  // sp.s a specialty string, pl. "Felnőttek, 14-18 évesek"
  if(!kor) return true;
  var s = sp.s;
  if(kor === "felno") return s.indexOf("Felnőttek") > -1;
  if(kor === "kamasz") return s.indexOf("14-18") > -1 || s.indexOf("7-18") > -1;
  if(kor === "gyerek") return s.indexOf("7-18") > -1 || s.indexOf("3-6") > -1;
  if(kor === "kiskoru") return s.indexOf("3-6") > -1 || s.indexOf("0-3") > -1;
  if(kor === "csecsemo") return s.indexOf("0-3") > -1;
  return true;
}

function hasCategoryMatch(temak){
  var temakNorm = temak.map(function(t){
    return t.toLowerCase()
      .replace(/á/g,"a").replace(/é/g,"e").replace(/í/g,"i")
      .replace(/ó/g,"o").replace(/ö/g,"o").replace(/ő/g,"o")
      .replace(/ú/g,"u").replace(/ü/g,"u").replace(/ű/g,"u");
  }).join(" ");
  return Object.keys(KATEGORIA_MAP).some(function(k){ return temakNorm.indexOf(k) > -1; });
}

function getCandidates() {
  var temakNorm = state.temak.map(function(t){
    return t.toLowerCase()
      .replace(/á/g,"a").replace(/é/g,"e").replace(/í/g,"i")
      .replace(/ó/g,"o").replace(/ö/g,"o").replace(/ő/g,"o")
      .replace(/ú/g,"u").replace(/ü/g,"u").replace(/ű/g,"u");
  }).join(" ");

  var idSet = {};
  Object.keys(KATEGORIA_MAP).forEach(function(k){
    if(temakNorm.indexOf(k) > -1){
      KATEGORIA_MAP[k].forEach(function(id){ idSet[id] = true; });
    }
  });

  var ids = Object.keys(idSet).map(Number);
  if(ids.length === 0){
    ids = SP.filter(function(s){ return s.t !== "coach"; }).map(function(s){ return s.id; });
  }

  // KÖTELEZŐ: Korcsoport szűrés - mindig fut, sosem hagyható ki
  ids = ids.filter(function(id){
    var sp = SP.find(function(s){ return s.id === id; });
    return sp && specialistMatchesKor(sp, state.kor);
  });

  // Végzettség szűrés - szintén kötelező, nem írható felül
  var tipusFilter = state.vegzettseg;
  if(tipusFilter && tipusFilter !== "mindegy" && tipusFilter !== "coach"){
    ids = ids.filter(function(id){
      var sp = SP.find(function(s){ return s.id === id; });
      if(!sp) return false;
      if(tipusFilter === "klinikai") return sp.t === "klinikai";
      if(tipusFilter === "pszichoterapeuta") return sp.t === "pszichoterapeuta";
      if(tipusFilter === "pszichologus") return sp.t !== "coach";
      return true;
    });
  }

  // Nem szűrés - kötelező
  var nemFilter = state.nem;
  if(nemFilter && nemFilter !== "mindegy"){
    ids = ids.filter(function(id){
      var sp = SP.find(function(s){ return s.id === id; });
      return sp && sp.g === nemFilter;
    });
  }

  // Ha a szigorú szűrés után KEVÉS marad (de legalább 1), bővítjük csak a témakör-relevánsak közül,
  // a kor és végzettség szűrést sosem engedjük el
  if(ids.length < 3){
    var allTemaIds = Object.keys(idSet).map(Number);
    var bovitett = allTemaIds.filter(function(id){
      var sp = SP.find(function(s){ return s.id === id; });
      if(!sp) return false;
      // Kor szűrés MINDIG kötelező marad
      if(!specialistMatchesKor(sp, state.kor)) return false;
      // Végzettség szűrést itt enyhítjük (csak akkor, ha nem coach-ot kerestek)
      if(tipusFilter === "coach") return sp.t === "coach";
      return true;
    });
    if(bovitett.length > ids.length){
      ids = bovitett;
    }
  }

  var candidates = ids.map(function(id){
    return SP.find(function(s){ return s.id === id; });
  }).filter(Boolean);

  var seen = {};
  candidates = candidates.filter(function(sp){
    if(seen[sp.id]) return false;
    seen[sp.id] = true;
    return true;
  });

  candidates.sort(function(a,b){
    var capA = hasCapacity(a) ? 0 : 1;
    var capB = hasCapacity(b) ? 0 : 1;
    if(capA !== capB) return capA - capB;
    if(a.prio !== b.prio) return a.prio - b.prio;
    return Math.random() - 0.5;
  });

  return candidates;
}

// Kor/végzettség/nem szerint szűrt szakemberkör, kategória-egyezés nélkül.
// Ezt használja az AI-alapú szabadszöveges keresés, ami a szakemberek
// szakképzettség-leírása (r mező) és korosztály-specialitása (s mező) alapján
// próbál illesztést találni akkor, ha a KATEGORIA_MAP kulcsszavak alapján nincs találat.
function getBaseFilteredSpecialists(){
  var ids = SP.filter(function(s){ return s.t !== "coach"; }).map(function(s){ return s.id; });
  ids = ids.filter(function(id){
    var sp = SP.find(function(s){ return s.id === id; });
    return sp && specialistMatchesKor(sp, state.kor);
  });
  var tipusFilter = state.vegzettseg;
  if(tipusFilter && tipusFilter !== "mindegy" && tipusFilter !== "coach"){
    ids = ids.filter(function(id){
      var sp = SP.find(function(s){ return s.id === id; });
      if(!sp) return false;
      if(tipusFilter === "klinikai") return sp.t === "klinikai";
      if(tipusFilter === "pszichoterapeuta") return sp.t === "pszichoterapeuta";
      if(tipusFilter === "pszichologus") return sp.t !== "coach";
      return true;
    });
  }
  var nemFilter = state.nem;
  if(nemFilter && nemFilter !== "mindegy"){
    ids = ids.filter(function(id){
      var sp = SP.find(function(s){ return s.id === id; });
      return sp && sp.g === nemFilter;
    });
  }
  return ids.map(function(id){ return SP.find(function(s){ return s.id === id; }); }).filter(Boolean);
}

// AI-alapú illesztés a szakemberek bemutatkozása és "Miben tudok segíteni" szövege alapján.
// Ezt használjuk mindenhol, ahol nincs (vagy nem elég erős) a validált témakör-egyezés:
// elsősorban a 24, még nem feldolgozott adatlapú kollégánál, illetve kiegészítésként
// a szabadszöveges keresésnél a kategória-találatok mellett.
function fetchBioMatches(pool, onDone){
  if(pool.length === 0){ onDone([]); return; }
  var listText = pool.map(function(s){
    var parts = [s.n];
    if(s.bio) parts.push("Bemutatkozás: " + s.bio);
    if(s.miben) parts.push("Miben tudok segíteni: " + s.miben);
    return parts.join(" | ");
  }).join("\n---\n");
  var sys = "Te egy szakember-kereső asszisztens vagy egy pszichológiai/coaching központban. A látogató leírta, milyen segítségre van szüksége. Az alábbi szakemberek bemutatkozó szövege és \"Miben tudok segíteni\" listája alapján válaszd ki AZOKAT a szakembereket - LEGFELJEBB 8-AT -, akiknek a leírása alapján ÉRDEMBEN illeszkedik a látogató igényére. FONTOS: ne korlátozd magad mesterségesen 3 főre - ha 5 vagy 6 szakember is valóban releváns a szöveg alapján, mindet sorold fel. Fordítva is igaz: ha csak 1 valóban releváns, csak azt az 1-et add vissza. Csak akkor válassz valakit, ha ez a szöveg alapján tényleg indokolható - ne találgass, ne erőltess egyezést, ne egészítsd ki a listát kitalált vagy bizonytalan találatokkal csak azért, hogy többet adj vissza. Ha SENKI nem illik egyértelműen, válaszolj PONTOSAN ezzel az egy szóval: NINCS_TALALAT. Ha találtál megfelelőt, válaszolj KIZÁRÓLAG a nevek vesszővel elválasztott listájával, pontosan úgy, ahogy szerepelnek - semmi mást ne írj, se indoklást, se markdownt.";
  var ctx = "SZAKEMBEREK:\n" + listText + "\n\nLÁTOGATÓ IGÉNYE: " + state.temak.join(", ");

  fetch("https://a-hely.com/proxy.php", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-haiku-4-5-20251001",
      max_tokens:300,
      system: sys,
      messages:[{role:"user", content:ctx}]
    })
  }).then(function(r){ return r.json(); }).then(function(data){
    var txt = (data.content || []).map(function(b){ return b.text||""; }).join("").trim();
    if(!txt || txt.indexOf("NINCS_TALALAT") > -1){ onDone([]); return; }
    var names = txt.split(",").map(function(n){ return n.trim(); }).filter(Boolean);
    var matched = [];
    names.forEach(function(name){
      var sp = pool.find(function(s){ return s.n === name; }) || findSP(name);
      if(sp && matched.indexOf(sp) === -1) matched.push(sp);
    });
    onDone(matched);
  }).catch(function(){
    onDone([]);
  });
}

function getCandidatesForTopic(topicText) {
  var savedTemak = state.temak;

// Téma-szöveg rövidítése a fejléchez: először megpróbáljuk visszakeresni az eredeti
// gombfeliratot a BTNS tömbből (pl. "Szorongás" a "Szorongással kapcsolatban..." helyett),
// ha nem találjuk, az értéket levágjuk.
function shortTopicLabel(t) {
  var allBtnSets = ["tema_felno","tema_kamasz","tema_gyerek","tema_csecsemo"];
  for(var si=0; si<allBtnSets.length; si++){
    var items = BTNS[allBtnSets[si]] || [];
    for(var ii=0; ii<items.length; ii++){
      if(items[ii].v === t) return items[ii].l;
    }
  }
  // Fallback: levágjuk a "kapcsolatban keresek segítséget" / "témában keresek..." részt
  var s = t.replace(/\s*(kapcsolatban|témában)\s*(keresek|keresel|keresünk)\s*(segítséget|coaching segítséget)?\s*$/i, "").trim();
  if(s.length > 70) s = s.slice(0,68) + "…";
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function callAI(){
  busy = true;
  document.getElementById("go").disabled = true;

  // Ha csak EGY téma van, a régi egyszerű egységes flow fut.
  // Ha TÖBB téma van, csoportosítjuk a találatokat témánként.
  var realTopics = state.temak.filter(function(t){ return t.indexOf("Más témában") === -1; });

  if(!freeTextSearch && realTopics.length > 1){
    // Minden témához kiszámítjuk a jelöltlistát
    var groups = realTopics.map(function(t){
      return { label: shortTopicLabel(t), candidates: getCandidatesForTopic(t) };
    });
    // Ha mindkét lista üres, menjünk kapcsolatfelvételre
    var totalCandidates = groups.reduce(function(sum, g){ return sum + g.candidates.length; }, 0);
    if(totalCandidates === 0){
      botMsg("Sajnos ezekben a témákban nem találtam hozzád illő szakembert az adatbázisunkban. Vedd fel velünk a kapcsolatot — csapatunk személyesen segít megtalálni a megfelelő szakembert.");
      showKapcsolat();
      busy = false;
      document.getElementById("go").disabled = false;
      return;
    }
    showGroupedResults(groups);
    return;
  }

  // 1. Elsődleges: validált témakör-kategória egyezés (kollégák bejelölt adatlapjai alapján).
  var categoryMatched = hasCategoryMatch(state.temak);
  var categoryCandidates = categoryMatched ? getCandidates() : [];

  if(freeTextSearch){
    var pool = getBaseFilteredSpecialists();
    fetchBioMatches(pool, function(bioMatches){
      freeTextSearch = false;
      var combined = categoryCandidates.slice();
      bioMatches.forEach(function(sp){
        if(combined.indexOf(sp) === -1) combined.push(sp);
      });
      if(combined.length === 0){
        botMsg("Sajnos ebben a témában nem találtam hozzád illő szakembert az adatbázisunkban. Vedd fel velünk a kapcsolatot — csapatunk személyesen segít megtalálni a megfelelő szakembert.");
        showKapcsolat();
        busy = false;
        document.getElementById("go").disabled = false;
        return;
      }
      showFinalResults(combined);
    });
    return;
  }

  var buttonCandidates = getCandidates();
  if(buttonCandidates.length === 0){
    botMsg("Sajnos ebben a témában nem találtam hozzád illő szakembert az adatbázisunkban. Vedd fel velünk a kapcsolatot — csapatunk személyesen segít megtalálni a megfelelő szakembert.");
    showKapcsolat();
    busy = false;
    document.getElementById("go").disabled = false;
    return;
  }
  showFinalResults(buttonCandidates);
}

    for(var i=prio3.length-1;i>0;i--){

    var rest = kapac.concat(prio2).concat(prio3).slice(3);
    showCardsGrouped(batch, "more_results");
    if(rest.length > 0){ showTovabbi(rest); }
    else { showKapcsolat(); }
  };
  msgs.appendChild(btn);
  scroll();
}

// Kapcsolat kartya

  sendEvent('contact_shown');
  var msgs = document.getElementById("msgs");
  var d = document.createElement("div");
  d.className = "card";

  msgs.appendChild(d);
  showInputRow("Válassz vagy írj ide szabadon...");
  scroll();
}
